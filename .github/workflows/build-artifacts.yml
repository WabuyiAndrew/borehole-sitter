name: Build BoreHole Sitter release packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Build web app
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://borehole-sitter.onrender.com
          VITE_MAPTILER_KEY: ''
        run: npm run build
      
      - name: Sync Capacitor Android
        working-directory: frontend
        run: npx cap sync android
      
      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x ./gradlew
      
      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoreHole-Sitter-android-apk-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

  build-windows-tauri:
    name: Build Windows EXE/Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Build web app
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://borehole-sitter.onrender.com
          VITE_MAPTILER_KEY: ''
        run: npm run build
      
      - name: Build Tauri bundle
        working-directory: frontend
        run: npm run tauri:build
      
      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoreHole-Sitter-windows-tauri-bundle
          path: frontend/src-tauri/target/release/bundle/**