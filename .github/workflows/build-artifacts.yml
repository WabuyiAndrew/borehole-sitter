name: Build BoreHole Sitter release packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install Android SDK commandline tools
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y wget unzip
          ANDROID_SDK_ROOT="$HOME/android-sdk"
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline.zip
          unzip -q cmdline.zip -d "${ANDROID_SDK_ROOT}/cmdline-tools"
          if [ -d "${ANDROID_SDK_ROOT}/cmdline-tools/cmdline-tools" ]; then
            mv "${ANDROID_SDK_ROOT}/cmdline-tools/cmdline-tools" "${ANDROID_SDK_ROOT}/cmdline-tools/latest"
          else
            mv "${ANDROID_SDK_ROOT}/cmdline-tools" "${ANDROID_SDK_ROOT}/cmdline-tools/latest" || true
          fi
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "PATH=${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:$PATH" >> $GITHUB_ENV
          export PATH=${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:$PATH
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --sdk_root=${ANDROID_SDK_ROOT} --install "platform-tools" "platforms;android-33" "build-tools;33.0.2" 2>/dev/null || true
        shell: bash
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build web app
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'http://localhost:8000' }}
          VITE_MAPTILER_KEY: ${{ secrets.VITE_MAPTILER_KEY || '' }}
        run: npm run build
      - name: Sync Capacitor Android
        working-directory: frontend
        run: npx cap sync android
      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoreHole-Sitter-android-apk-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

  build-windows-tauri:
    name: Build Windows EXE/Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build web app
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'http://localhost:8000' }}
          VITE_MAPTILER_KEY: ${{ secrets.VITE_MAPTILER_KEY || '' }}
        run: npm run build
      - name: Build Tauri bundle
        working-directory: frontend
        run: npm run tauri:build
      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoreHole-Sitter-windows-tauri-bundle
          path: frontend/src-tauri/target/release/bundle/**
